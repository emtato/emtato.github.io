<!DOCTYPE html>
<html lang="en-CA">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tip Line | Public Safety Desk</title>
  <link rel="stylesheet" href="tip.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="#" class="brand void-link" aria-label="Home">
        <span class="badge">NCPD</span>
        <span class="brand-text">Night City Police Department</span>
      </a>

      <nav class="top-nav" aria-label="Main navigation">
        <a href="#" class="void-link">About</a>
        <a href="#" class="void-link">Services</a>
        <a href="#" class="void-link">Contact</a>
      </nav>
    </div>
  </header>

  <main class="tip-main">
    <section class="tip-card" aria-labelledby="tip-title">
      <p class="eyebrow">Public information request</p>
      <h1 id="tip-title">Have information?</h1>
      <p class="lede">
        A person of interest may have information related to an ongoing fry-adjacent investigation.
        Please submit a concise tip using the secure form.
      </p>
      <a class="tip-button" href="form.html">Tip the Police</a>
    </section>
  </main>

  <footer class="site-footer">
    <a href="#" class="void-link">Privacy</a>
    <a href="#" class="void-link">Accessibility</a>
    <a href="#" class="void-link">Directory</a>
  </footer>

  <script src="form.js"></script>

</html>
